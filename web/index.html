<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthioMorph - Research Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+Ethiopic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "var(--color-primary)",
                        bronze: "var(--color-bronze)",
                        surface: "var(--color-surface)",
                        "surface-dark": "var(--color-surface-dark)",
                        "background-dark": "var(--color-bg)",
                        muted: "var(--color-muted)"
                    },
                    fontFamily: {
                        display: ["Lexend", "Space Grotesk", "sans-serif"],
                        ethiopic: ["Noto Sans Ethiopic", "serif"]
                    },
                    boxShadow: {
                        glow: "0 0 15px rgba(255, 255, 255, 0.1)",
                        "glow-strong": "0 0 25px rgba(255, 255, 255, 0.2)"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-primary: #000000;
            --color-bronze: #e5e5e5;
            --color-surface: #f5f5f5;
            --color-surface-dark: #fafafa;
            --color-bg: #ffffff;
            --color-muted: #666666;
        }
        .dark {
            --color-primary: #ffffff;
            --color-bronze: #333333;
            --color-surface: #1a1a1a;
            --color-surface-dark: #0f0f0f;
            --color-bg: #0a0a0a;
            --color-muted: #888888;
        }
        body { background: var(--color-bg); }
        .dark body, html.dark body { background: #0a0a0a; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f5f5f5; }
        .dark ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #999; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #444; }
        
        .manuscript-bg { background: transparent; }
        .glow-text { text-shadow: none; }
        .glow-box { box-shadow: 0 0 20px rgba(0, 0, 0, 0.05); }
        .dark .glow-box { box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); }
        .ghost-skeleton { font-size: 10rem; opacity: 0.03; user-select: none; pointer-events: none; }
        .subject-wheel-mask { mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 60s linear infinite; }
        @keyframes skeleton-shimmer {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 0.85; }
        }
        .skeleton {
            background-color: rgba(0, 0, 0, 0.1);
            animation: skeleton-shimmer 1.5s ease-in-out infinite;
        }
        .dark .skeleton { background-color: rgba(255, 255, 255, 0.12); }
        .skeleton-surface {
            background-color: var(--color-surface);
            border: 1px solid var(--color-bronze);
        }
        .dark .skeleton-surface { background-color: var(--color-surface); }
        .skeleton-node { fill: var(--color-surface); stroke: var(--color-bronze); stroke-width: 1; }
        .skeleton-fill { fill: rgba(0, 0, 0, 0.1); animation: skeleton-shimmer 1.5s ease-in-out infinite; }
        .dark .skeleton-fill { fill: rgba(255, 255, 255, 0.12); }
        .skeleton-stroke { stroke: var(--color-bronze); stroke-opacity: 0.55; animation: skeleton-shimmer 1.5s ease-in-out infinite; }
    </style>
</head>
<body class="text-muted font-display min-h-screen flex flex-col overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API = {
            analyze: async (word) => (await fetch(`/api/analyze?word=${encodeURIComponent(word)}`)).json(),
            expand: async (root) => (await fetch(`/api/expand?root=${encodeURIComponent(root)}`)).json(),
            expandSimple: async (root) => (await fetch(`/api/expand/simple?root=${encodeURIComponent(root)}`)).json(),
            templates: async () => (await fetch('/api/templates')).json()
        };

        const Icon = ({ name, className = "" }) => (
            <span className={`material-symbols-outlined ${className}`}>{name}</span>
        );

        const Skeleton = ({ className = "", style }) => (
            <div className={`skeleton ${className}`} style={style} aria-hidden="true" />
        );
        const SkeletonLine = ({ w = "w-full", h = "h-3", className = "", style }) => (
            <Skeleton className={`${w} ${h} rounded ${className}`} style={style} />
        );
        const SkeletonSurface = ({ className = "", children }) => (
            <div className={`skeleton-surface rounded-lg ${className}`}>{children}</div>
        );

        const RADIAL_LAYOUT = {
            width: 700, height: 500, cx: 350, cy: 250,
            branchDist: 110, itemDist: 210, itemSpread: 0.4, itemsPerBranch: 2,
            branches: [
                { angle: -90, label: 'TENSE' },
                { angle: 210, label: 'DERIVED' },
                { angle: 330, label: 'FORMS' },
            ],
        };
        const radialItemAngles = (branchAngle, count = RADIAL_LAYOUT.itemsPerBranch) =>
            Array.from({ length: count }, (_, i) =>
                branchAngle + (i - (count - 1) / 2) * RADIAL_LAYOUT.itemSpread
            );

        const XRayResultsSkeleton = () => (
            <div className="lg:col-span-12 grid grid-cols-1 lg:grid-cols-12 gap-8" aria-busy="true">
                <section className="lg:col-span-7">
                    <h3 className="text-muted text-xs font-bold uppercase tracking-widest mb-3">Morphological Breakdown</h3>
                    <div className="bg-surface/50 border border-bronze/50 rounded-xl p-6 relative">
                        <div className="absolute left-10 top-6 bottom-6 w-px bg-bronze/30" />
                        {[
                            { stage: 'STAGE 01: INPUT', h: 'h-14' },
                            { stage: 'STAGE 02: AFFIX PEELING', h: 'h-14' },
                            { stage: 'STAGE 03: ROOT IDENTIFIED', h: 'h-20' },
                        ].map((row, i) => (
                            <div key={i} className={`flex gap-6 relative ${i < 2 ? 'mb-6' : ''}`}>
                                <div className="size-10 rounded-full skeleton-surface shrink-0 z-10" />
                                <div className="flex-1">
                                    <p className="text-xs font-mono text-muted/50 mb-2">{row.stage}</p>
                                    <SkeletonSurface className={`p-4 ${row.h} flex items-center`}>
                                        <SkeletonLine w="w-24" h="h-6" />
                                    </SkeletonSurface>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
                <section className="lg:col-span-5 space-y-4">
                    <h3 className="text-muted text-xs font-bold uppercase tracking-widest mb-3">Lexical Data</h3>
                    <div className="bg-surface-dark border border-bronze rounded-xl overflow-hidden">
                        <div className="bg-surface border-b border-bronze px-5 py-3 flex justify-between items-center">
                            <SkeletonLine w="w-16" h="h-6" />
                            <Skeleton className="w-16 h-5 rounded" />
                        </div>
                        <div className="p-5 space-y-4">
                            <div>
                                <p className="text-xs text-muted/50 uppercase tracking-wider mb-1">Meaning</p>
                                <SkeletonLine w="w-full" h="h-5" />
                            </div>
                            <div>
                                <p className="text-xs text-muted/50 uppercase tracking-wider mb-1">Analysis Method</p>
                                <SkeletonLine w="w-3/4" h="h-4" />
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        {['Pattern', 'Confidence'].map(label => (
                            <div key={label} className="bg-surface rounded-lg p-4 border border-bronze">
                                <p className="text-xs text-muted/50 uppercase mb-2">{label}</p>
                                <SkeletonLine w="w-16" h="h-5" />
                            </div>
                        ))}
                    </div>
                </section>
            </div>
        );

        const MatrixGridSkeleton = () => (
            <div className="flex-1 overflow-auto grid lg:grid-cols-4 gap-6 content-start" aria-busy="true">
                <div className="lg:col-span-3 bg-surface-dark rounded-xl border border-bronze overflow-hidden shadow-xl h-fit">
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-surface border-b-2 border-primary/30">
                                <tr>
                                    <th className="py-4 px-5 text-left text-xs font-bold text-primary uppercase tracking-wider w-32">Subject</th>
                                    {['Perfect', 'Imperfect', 'Jussive', 'Imperative'].map(label => (
                                        <th key={label} className="py-4 px-5 text-left min-w-[140px]">
                                            <span className="text-gray-900 dark:text-white text-sm font-bold block">{label}</span>
                                            <SkeletonLine w="w-12" h="h-2" className="mt-1" />
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-bronze/30">
                                {Array.from({ length: 10 }).map((_, i) => (
                                    <tr key={i}>
                                        <td className="py-3 px-5">
                                            <SkeletonLine w="w-12" h="h-5" className="mb-1" />
                                            <SkeletonLine w="w-8" h="h-2" />
                                        </td>
                                        {[0, 1, 2, 3].map(j => (
                                            <td key={j} className="px-5 py-3">
                                                <SkeletonSurface className="px-3 py-2 inline-block min-w-[80px]">
                                                    <SkeletonLine w="w-14" h="h-5" />
                                                </SkeletonSurface>
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
                <div className="space-y-3">
                    <h3 className="text-xs text-muted uppercase tracking-widest font-bold">Derived Forms</h3>
                    {['infinitive', 'active participle', 'passive participle', 'instrumental', 'verbal noun', 'abstract noun', 'causative agent'].map(key => (
                        <div key={key} className="bg-surface-dark rounded-lg p-4 border border-bronze/50">
                            <p className="text-[10px] text-muted/50 uppercase tracking-wider mb-2">{key}</p>
                            <SkeletonLine w="w-16" h="h-6" />
                        </div>
                    ))}
                </div>
            </div>
        );

        const MorpherSkeleton = () => (
            <div className="text-center" aria-busy="true">
                <SkeletonSurface className="inline-block px-12 py-6 md:px-16 md:py-8">
                    <SkeletonLine w="w-32 md:w-40" h="h-14 md:h-20" />
                </SkeletonSurface>
                <div className="mt-8 inline-block px-6 py-3 rounded-full border border-bronze bg-surface/50">
                    <SkeletonLine w="w-52" h="h-4" />
                </div>
            </div>
        );

        const CompareTableSkeleton = ({ verbCount = 3, forms }) => (
            <tbody className="divide-y divide-bronze/30" aria-busy="true">
                {forms.map((form, fi) => (
                    <tr key={form.key} className={fi % 2 === 0 ? 'bg-background-dark/30' : ''}>
                        <td className="p-4 text-sm font-medium text-gray-900 dark:text-white sticky left-0 bg-surface-dark border-r border-bronze/30 z-10">
                            {form.label}
                        </td>
                        {Array.from({ length: verbCount }).map((_, vi) => (
                            <td key={vi} className="p-4 text-center">
                                <SkeletonSurface className="px-4 py-2 inline-block min-w-[100px]">
                                    <SkeletonLine w="w-16" h="h-6" className="mx-auto" />
                                </SkeletonSurface>
                            </td>
                        ))}
                    </tr>
                ))}
            </tbody>
        );

        const RadialTreeSkeleton = () => {
            const { width, height, cx, cy, branchDist, itemDist, branches } = RADIAL_LAYOUT;
            return (
                <svg
                    viewBox={`0 0 ${width} ${height}`}
                    width="100%"
                    height="auto"
                    preserveAspectRatio="xMidYMid meet"
                    className="max-w-[700px] w-full"
                    aria-busy="true"
                >
                    <circle cx={cx} cy={cy} r={150} className="skeleton-fill" opacity="0.15" />
                    <circle cx={cx} cy={cy} r={180} fill="none" className="skeleton-stroke" strokeWidth="1" strokeDasharray="5,5" />
                    <circle cx={cx} cy={cy} r={50} className="skeleton-node" />
                    <rect x={cx - 22} y={cy - 14} width={44} height={16} rx={3} className="skeleton-fill" />
                    <rect x={cx - 14} y={cy + 6} width={28} height={8} rx={2} className="skeleton-fill" />
                    {branches.map((branch) => {
                        const rad = (branch.angle * Math.PI) / 180;
                        const bx = cx + Math.cos(rad) * branchDist;
                        const by = cy + Math.sin(rad) * branchDist;
                        return (
                            <g key={branch.label}>
                                <line x1={cx} y1={cy} x2={bx} y2={by} className="skeleton-stroke" strokeWidth="1" strokeDasharray="4,4" />
                                <rect x={bx - 35} y={by - 10} width={70} height={20} rx={4} className="skeleton-node" />
                                <rect x={bx - 18} y={by - 4} width={36} height={8} rx={2} className="skeleton-fill" />
                                {radialItemAngles(branch.angle).map((itemAngle, ii) => {
                                    const itemRad = (itemAngle * Math.PI) / 180;
                                    const ix = cx + Math.cos(itemRad) * itemDist;
                                    const iy = cy + Math.sin(itemRad) * itemDist;
                                    return (
                                        <g key={ii}>
                                            <line x1={bx} y1={by} x2={ix} y2={iy} className="skeleton-stroke" strokeWidth="1" opacity="0.6" />
                                            <rect x={ix - 45} y={iy - 25} width={90} height={50} rx={8} className="skeleton-node" />
                                            <rect x={ix - 20} y={iy - 12} width={40} height={14} rx={3} className="skeleton-fill" />
                                            <rect x={ix - 24} y={iy + 4} width={48} height={8} rx={2} className="skeleton-fill" />
                                        </g>
                                    );
                                })}
                            </g>
                        );
                    })}
                </svg>
            );
        };

        const PatternCardsSkeleton = () => (
            <div aria-busy="true">
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                    {Array.from({ length: 6 }).map((_, i) => (
                        <div key={i} className="bg-surface-dark rounded-xl border border-bronze/50 p-5">
                            <SkeletonLine w="w-32" h="h-5" className="mb-1" />
                            <SkeletonLine w="w-full" h="h-3" className="mb-4 font-mono" />
                            <SkeletonSurface className="p-4 flex items-center justify-center gap-3 mb-4 h-16">
                                <SkeletonLine w="w-8" h="h-5" />
                                <SkeletonLine w="w-12" h="h-4" />
                                <SkeletonLine w="w-8" h="h-5" />
                            </SkeletonSurface>
                            <div className="flex flex-wrap gap-2">
                                <Skeleton className="w-20 h-5 rounded" />
                                <Skeleton className="w-20 h-5 rounded" />
                            </div>
                        </div>
                    ))}
                </div>
                <div className="mt-10">
                    <h2 className="text-xl font-bold text-gray-900 dark:text-white mb-4">Available Verb Types</h2>
                    <div className="flex flex-wrap gap-2">
                        {Array.from({ length: 8 }).map((_, i) => (
                            <Skeleton key={i} className="w-20 h-9 rounded-lg" />
                        ))}
                    </div>
                </div>
            </div>
        );

        const RootInput = ({ value, onChange, onSubmit, loading, label = 'Root Input', submitLabel = 'Expand', submitIcon = 'play_arrow', showLabel = true, className = '' }) => (
            <div className={className}>
                {showLabel && <p className="text-xs text-muted/50 uppercase tracking-widest mb-2">{label}</p>}
                <div className="flex gap-2 items-center">
                    <input
                        type="text"
                        value={value}
                        onChange={onChange}
                        onKeyPress={(e) => e.key === 'Enter' && !loading && onSubmit()}
                        className="bg-surface border border-bronze rounded-lg px-4 py-2.5 text-2xl font-ethiopic w-32 text-center text-gray-900 dark:text-white focus:outline-none focus:border-primary"
                    />
                    <button
                        onClick={onSubmit}
                        disabled={loading || !value.trim()}
                        className="px-4 py-2.5 bg-primary text-background-dark font-bold rounded-lg flex items-center gap-2 disabled:opacity-50 transition-opacity"
                    >
                        <Icon name={loading ? 'progress_activity' : submitIcon} className={`text-lg ${loading ? 'animate-spin-slow' : ''}`} />
                        <span>{submitLabel}</span>
                    </button>
                </div>
            </div>
        );

        // Navigation Component
        const Nav = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'xray', label: 'Analyze', icon: 'search' },
                { id: 'matrix', label: 'Multiplier', icon: 'grid_view' },
                { id: 'slider', label: 'Morpher', icon: 'tune' },
                { id: 'compare', label: 'Compare', icon: 'compare' },
                { id: 'radial', label: 'Root Tree', icon: 'account_tree' },
                { id: 'patterns', label: 'Patterns', icon: 'category' }
            ];

            const titles = {
                xray: 'X-Ray Feed', matrix: 'Multiplier Grid', slider: 'Subject Morpher',
                compare: 'Compare Matrix', radial: 'Root Tree', patterns: 'Pattern Library'
            };

            return (
                <header className="flex-none border-b border-bronze bg-surface-dark px-6 py-3 z-50">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-8">
                            <div className="flex items-center gap-3 text-gray-900 dark:text-white">
                                <div className="size-9 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                                    <Icon name="translate" className="text-2xl" />
                                </div>
                                <div>
                                    <h2 className="text-gray-900 dark:text-white text-lg font-bold tracking-tight leading-none">EthioMorph</h2>
                                    <span className="text-xs text-primary/70">{titles[activeTab]}</span>
                                </div>
                            </div>
                            <nav className="hidden md:flex items-center gap-1 bg-surface p-1 rounded-lg border border-bronze">
                                {tabs.map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-3 py-1.5 rounded text-sm font-medium flex items-center gap-1.5 transition-all ${
                                            activeTab === tab.id 
                                                ? 'bg-primary text-background-dark font-bold' 
                                                : 'text-muted hover:text-gray-900 dark:text-white'
                                        }`}
                                    >
                                        <Icon name={tab.icon} className="text-base" />
                                        <span className="hidden lg:inline">{tab.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    <div className="flex items-center gap-3">
                            <button 
                                onClick={() => {
                                    document.documentElement.classList.toggle('dark');
                                    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                                }} 
                                className="size-9 rounded-full bg-surface hover:bg-bronze flex items-center justify-center border border-bronze transition-colors" 
                                title="Toggle theme"
                            >
                                <Icon name="contrast" className="text-lg" />
                            </button>
                            <a href="/api/health" target="_blank" className="hidden md:flex size-9 rounded-full bg-surface hover:bg-bronze items-center justify-center border border-bronze transition-colors" title="API Health">
                                <Icon name="monitor_heart" className="text-lg" />
                            </a>
                            <a href="/api/templates" target="_blank" className="hidden md:flex size-9 rounded-full bg-surface hover:bg-bronze items-center justify-center border border-bronze transition-colors" title="Templates JSON">
                                <Icon name="data_object" className="text-lg" />
                            </a>
                        </div>
                    </div>
                </header>
            );
        };

        // Mobile Bottom Navigation
        const MobileNav = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'xray', label: 'Analyze', icon: 'search' },
                { id: 'matrix', label: 'Grid', icon: 'grid_view' },
                { id: 'slider', label: 'Morph', icon: 'tune' },
                { id: 'compare', label: 'Compare', icon: 'compare' },
                { id: 'radial', label: 'Tree', icon: 'account_tree' },
                { id: 'patterns', label: 'Patterns', icon: 'category' },
            ];
            return (
                <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-surface-dark border-t border-bronze z-50">
                    <div className="flex flex-nowrap justify-around items-center py-2 overflow-x-auto">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg transition-all shrink-0 ${
                                    activeTab === tab.id 
                                        ? 'text-primary' 
                                        : 'text-muted'
                                }`}
                            >
                                <Icon name={tab.icon} className={`text-xl ${activeTab === tab.id ? 'text-primary' : ''}`} />
                                <span className="text-[9px] font-medium">{tab.label}</span>
                            </button>
                        ))}
                </div>
            </nav>
            );
        };

        // X-Ray Tab - Morphological Analysis
        const XRayTab = () => {
            const [word, setWord] = useState('አግብርት');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const analyze = async () => {
                if (!word.trim()) return;
                setLoading(true);
                try { setResult(await API.analyze(word)); } catch (e) { console.error(e); }
                setLoading(false);
            };

            return (
                <div className="flex-1 overflow-auto manuscript-bg">
                    <div className="max-w-[1280px] mx-auto p-6 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Input Section */}
                        <section className="lg:col-span-12">
                            <h3 className="text-muted text-xs font-bold uppercase tracking-widest mb-3">Scriptorium Input</h3>
                            <div className="rounded-xl overflow-hidden shadow-2xl border border-bronze">
                                <div className="flex bg-surface px-4 py-3 border-b border-bronze justify-between items-center">
                                    <div className="flex items-center gap-2 text-muted/50">
                                        <Icon name="keyboard" className="text-sm" />
                                        <span className="text-xs font-mono">GEEZ_INPUT_MODE: ACTIVE</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <div className="size-3 rounded-full bg-red-500/30 border border-red-500/50"></div>
                                        <div className="size-3 rounded-full bg-primary/30 border border-primary/50"></div>
                                        <div className="size-3 rounded-full bg-green-500/30 border border-green-500/50"></div>
                                    </div>
                                </div>
                                <div className="relative">
                                    <textarea 
                                value={word}
                                onChange={(e) => setWord(e.target.value)}

                                        }`}
                                    >
                                        <span className="font-ethiopic text-lg block">{subj.geez}</span>
                                        <span className="text-[9px] uppercase">{subj.label}</span>
                                    </button>
                                            ))}
                                        </div>
                            </div>
                                    </div>
                                                    </div>
                </main>
            );
        };

        // Compare Tab - Side by side comparison
        const CompareTab = () => {
            const [verbs, setVerbs] = useState(['ሰከበ', 'ቀደሰ', 'ባረከ']);
            const [data, setData] = useState({});
            const [loading, setLoading] = useState(true);

            const loadAll = async () => {
                setLoading(true);
                const results = {};
                for (const v of verbs.filter(x => x)) {
                    try { results[v] = await API.expandSimple(v); } catch(e) { results[v] = null; }
                }
                setData(results);
                setLoading(false);
            };

            useEffect(() => { loadAll(); }, []);

            const FORMS = [
                { key: 'perfective.he', label: 'Perfect (He)', get: d => d?.perfective?.he },
                { key: 'imperfective.he', label: 'Imperfect (He)', get: d => d?.imperfective?.he },
                { key: 'jussive.he', label: 'Jussive (He)', get: d => d?.jussive?.he },
                { key: 'imperative.you_m', label: 'Imperative (You M)', get: d => d?.imperative?.you_m },
                { key: 'imperative_collapsed.you_m', label: 'Imperative collapsed', get: d => d?.variants?.imperative?.you_m?.join(' · ') },
                { key: 'derived.infinitive', label: 'Infinitive', get: d => d?.derived?.infinitive },
                { key: 'derived.active_participle', label: 'Active Part.', get: d => d?.derived?.active_participle },
                { key: 'derived.passive_participle', label: 'Passive Part.', get: d => d?.derived?.passive_participle },
                { key: 'derived.instrumental', label: 'Instrumental', get: d => d?.derived?.instrumental },
                { key: 'derived.verbal_noun', label: 'Verbal Noun', get: d => d?.derived?.verbal_noun }
            ];

            return (
                <div className="flex-1 overflow-auto manuscript-bg p-8">
                    <div className="max-w-[1400px] mx-auto">
                        <div className="flex flex-wrap items-end justify-between gap-4 mb-8">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white mb-2">Comparison Matrix</h1>
                                <p className="text-muted/70">Compare conjugation patterns across different verb types</p>
                                                </div>
                            <div className="flex flex-wrap items-end gap-4">
                                <div>
                                    <p className="text-xs text-muted/50 uppercase tracking-widest mb-2">Verb Roots</p>
                                    <div className="flex gap-2 items-center flex-wrap">
                                {verbs.map((v, i) => (
                                    <input
                                        key={i}
                                        type="text"
                                        value={v}
                                        onChange={(e) => { const newV = [...verbs]; newV[i] = e.target.value; setVerbs(newV); }}
                                        placeholder={`Root ${i + 1}`}
                                        className="bg-surface border border-bronze rounded-lg px-4 py-2.5 text-2xl font-ethiopic w-32 text-center text-gray-900 dark:text-white focus:outline-none focus:border-primary placeholder:text-muted/30 placeholder:text-sm"
                                    />
                                ))}
                                <button onClick={() => setVerbs([...verbs, ''])} className="px-3 py-2.5 border border-bronze/50 rounded-lg text-muted hover:text-gray-900 dark:text-white">
                                    <Icon name="add" />
                                </button>
                                <button onClick={loadAll} disabled={loading} className="px-4 py-2.5 bg-primary text-background-dark font-bold rounded-lg flex items-center gap-2 disabled:opacity-50">
                                    <Icon name={loading ? 'progress_activity' : 'compare'} className={`text-lg ${loading ? 'animate-spin-slow' : ''}`} />
                                    <span>Compare</span>
                                </button>
                                    </div>
                                </div>
                                            </div>
                                        </div>

                        <div className="bg-surface-dark rounded-xl border border-bronze overflow-hidden shadow-xl" aria-busy={loading}>
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                    <thead className="bg-surface border-b-2 border-primary/30">
                                        <tr>
                                            <th className="p-4 text-left text-xs font-bold uppercase tracking-wider text-primary min-w-[140px] sticky left-0 bg-surface z-10">Form</th>
                                            {verbs.filter(v => v).map(v => (
                                                <th key={v} className="p-4 text-center min-w-[160px]">
                                                    <span className="text-2xl font-bold font-ethiopic text-primary block">{v}</span>
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                    {loading ? (
                                        <CompareTableSkeleton verbCount={verbs.filter(v => v).length} forms={FORMS} />
                                    ) : (
                                    <tbody className="divide-y divide-bronze/30">
                                        {FORMS.map((form, fi) => (
                                            <tr key={form.key} className={fi % 2 === 0 ? 'bg-background-dark/30' : ''}>
                                                <td className="p-4 text-sm font-medium text-gray-900 dark:text-white sticky left-0 bg-surface-dark border-r border-bronze/30 z-10">
                                                    {form.label}
                                                </td>
                                                {verbs.filter(v => v).map(v => (
                                                    <td key={v} className="p-4 text-center">
                                                        <span className="font-ethiopic text-xl text-gray-900 dark:text-white">{form.get(data[v]) || '—'}</span>
                                                    </td>
                                                ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    )}
                                    </table>
                                </div>
                            </div>

                        {/* Type explanations */}
                        <div className="mt-6 grid grid-cols-3 gap-4">
                            <div className="p-4 rounded-lg bg-surface border border-bronze/50">
                                <p className="text-xs text-primary uppercase font-bold mb-1">Type A (ሰከበ)</p>
                                <p className="text-muted text-sm">Standard pattern - no vowel shift in imperfective</p>
                            </div>
                            <div className="p-4 rounded-lg bg-surface border border-bronze/50">
                                <p className="text-xs text-primary uppercase font-bold mb-1">Type B (ቀደሰ)</p>
                                <p className="text-muted text-sm">C1 shifts to 5th order (ቄ) in imperfective</p>
                            </div>
                            <div className="p-4 rounded-lg bg-surface border border-bronze/50">
                                <p className="text-xs text-primary uppercase font-bold mb-1">Type C (ባረከ)</p>
                                <p className="text-muted text-sm">C1 stays 4th order (ባ) throughout</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Radial Tab - Root Tree
        const RadialTab = () => {
            const svgRef = useRef();
            const [root, setRoot] = useState('ገበረ');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);

            const expand = async () => {
                if (!root.trim()) return;
                setLoading(true);
                try { setData(await API.expand(root)); } catch(e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => {
                if (!data || data.error) return;
                const width = 700, height = 500;
                const cx = width / 2, cy = height / 2;
                const isDark = document.documentElement.classList.contains('dark');
                const c = isDark ? {
                    nodeFill: '#1a1a1a',
                    nodeStroke: 'rgba(255,255,255,0.15)',
                    textPrimary: '#ffffff',
                    textMuted: '#888888',
                    linePrimary: 'rgba(255,255,255,0.2)',
                    lineSecondary: 'rgba(255,255,255,0.08)',
                    glow: 'rgba(255,255,255,0.04)',
                    ring: 'rgba(255,255,255,0.06)',
                } : {
                    nodeFill: '#f5f5f5',
                    nodeStroke: 'rgba(0,0,0,0.12)',
                    textPrimary: '#000000',
                    textMuted: '#666666',
                    linePrimary: 'rgba(0,0,0,0.15)',
                    lineSecondary: 'rgba(0,0,0,0.08)',
                    glow: 'rgba(0,0,0,0.03)',
                    ring: 'rgba(0,0,0,0.06)',
                };

                d3.select(svgRef.current).selectAll("*").remove();
                const svg = d3.select(svgRef.current)
                    .attr("viewBox", `0 0 ${width} ${height}`)
                    .attr("width", "100%")
                    .attr("preserveAspectRatio", "xMidYMid meet")
                    .attr("class", "max-w-[700px] w-full");

                const gradient = svg.append("defs").append("radialGradient").attr("id", "glow").attr("cx", "50%").attr("cy", "50%").attr("r", "50%");
                gradient.append("stop").attr("offset", "0%").attr("stop-color", c.glow);
                gradient.append("stop").attr("offset", "100%").attr("stop-color", "transparent");

                svg.append("circle").attr("cx", cx).attr("cy", cy).attr("r", 150).attr("fill", "url(#glow)");
                svg.append("circle").attr("cx", cx).attr("cy", cy).attr("r", 180).attr("fill", "none").attr("stroke", c.ring).attr("stroke-dasharray", "5,5");
                svg.append("circle").attr("cx", cx).attr("cy", cy).attr("r", 50).attr("fill", c.nodeFill).attr("stroke", c.nodeStroke).attr("stroke-width", 1.5);

                svg.append("text").attr("x", cx).attr("y", cy - 5).attr("text-anchor", "middle").attr("dominant-baseline", "middle")
                    .attr("fill", c.textPrimary).attr("font-family", "Noto Sans Ethiopic").attr("font-size", "22px").attr("font-weight", "bold")
                    .text(data._meta?.root || root);
                svg.append("text").attr("x", cx).attr("y", cy + 16).attr("text-anchor", "middle").attr("fill", c.textMuted).attr("font-size", "9px")
                    .text("ROOT");

                const branches = [
                    { angle: -90, label: "TENSE", items: [] },
                    { angle: 210, label: "DERIVED", items: [] },
                    { angle: 330, label: "FORMS", items: [] }
                ];

                if (data.perfective?.conjugations?.['3sm']) branches[0].items.push({ label: "Perfect", word: data.perfective.conjugations['3sm'].word });
                if (data.imperfective?.conjugations?.['3sm']) branches[0].items.push({ label: "Imperfect", word: data.imperfective.conjugations['3sm'].word });
                if (data.imperative?.conjugations?.['2sm']) {
                    branches[0].items.push({ label: "Imperative", word: data.imperative.conjugations['2sm'].word });
                    const collapsed = data.imperative.conjugations['2sm'].variants || [];
                    collapsed.forEach((variant, i) => {
                        branches[0].items.push({
                            label: i === 0 ? "Imp. collapsed" : "collapsed",
                            word: variant
                        });
                    });
                }
                if (data.derived?.infinitive) branches[1].items.push({ label: "Infinitive", word: data.derived.infinitive.word });
                if (data.derived?.active_participle) branches[1].items.push({ label: "Participle", word: data.derived.active_participle.word });
                if (data.derived?.verbal_noun) branches[2].items.push({ label: "Verbal Noun", word: data.derived.verbal_noun.word });
                if (data.derived?.instrumental) branches[2].items.push({ label: "Instrumental", word: data.derived.instrumental.word });

                branches.forEach((branch) => {
                    const rad = (branch.angle * Math.PI) / 180;
                    const bx = cx + Math.cos(rad) * 110, by = cy + Math.sin(rad) * 110;

                    svg.append("line").attr("x1", cx).attr("y1", cy).attr("x2", bx).attr("y2", by)
                        .attr("stroke", c.linePrimary).attr("stroke-width", 1).attr("stroke-dasharray", "4,4");

                    const g = svg.append("g").attr("transform", `translate(${bx}, ${by})`);
                    g.append("rect").attr("x", -35).attr("y", -10).attr("width", 70).attr("height", 20).attr("rx", 4)
                        .attr("fill", c.nodeFill).attr("stroke", c.nodeStroke);
                    g.append("text").attr("x", 0).attr("y", 4).attr("text-anchor", "middle").attr("fill", c.textMuted).attr("font-size", "9px").attr("font-weight", "bold")
                        .text(branch.label);

                    branch.items.forEach((item, i) => {
                        const itemRad = rad + (i - (branch.items.length - 1) / 2) * 0.4;
                        const ix = cx + Math.cos(itemRad) * 210, iy = cy + Math.sin(itemRad) * 210;

                        svg.append("line").attr("x1", bx).attr("y1", by).attr("x2", ix).attr("y2", iy)
                            .attr("stroke", c.lineSecondary).attr("stroke-width", 1);

                        const ig = svg.append("g").attr("transform", `translate(${ix}, ${iy})`).style("cursor", "pointer");
                        ig.append("rect").attr("x", -45).attr("y", -25).attr("width", 90).attr("height", 50).attr("rx", 8)
                            .attr("fill", c.nodeFill).attr("stroke", c.nodeStroke);
                        ig.append("text").attr("x", 0).attr("y", -3).attr("text-anchor", "middle").attr("fill", c.textPrimary)
                            .attr("font-family", "Noto Sans Ethiopic").attr("font-size", "15px").text(item.word);
                        ig.append("text").attr("x", 0).attr("y", 12).attr("text-anchor", "middle").attr("fill", c.textMuted).attr("font-size", "8px")
                            .text(item.label.toUpperCase());
                    });
                });
            }, [data, root]);

            return (
                <div className="flex-1 overflow-auto manuscript-bg p-8">
                    <div className="max-w-[1000px] mx-auto">
                        <div className="flex items-center justify-between mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900 dark:text-white">Radial Root Tree</h1>
                                <p className="text-muted/70 text-sm">Interactive visualization of root derivations</p>
                            </div>
                            <RootInput
                                value={root}
                                onChange={(e) => setRoot(e.target.value)}
                                onSubmit={expand}
                                loading={loading}
                                submitLabel="Generate"
                                submitIcon="hub"
                                showLabel={false}
                            />
                        </div>
                        <div className="bg-surface-dark/50 rounded-xl border border-bronze p-4 sm:p-8 flex justify-center items-center min-h-[500px] w-full" aria-busy={loading}>
                            <div className="w-full overflow-x-auto flex justify-center">
                            {loading ? (
                                <RadialTreeSkeleton />
                            ) : data && !data.error ? (
                                <svg ref={svgRef}></svg>
                            ) : (
                                <div className="text-center text-muted/50">
                                    <Icon name="hub" className="text-6xl mb-4" />
                                    <p>Enter a root and click Generate</p>
                                </div>
                            )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Patterns Tab
        const PatternsTab = () => {
            const [templates, setTemplates] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                API.templates().then(data => { setTemplates(data); setLoading(false); }).catch(() => setLoading(false));
            }, []);

            const derivedPatterns = templates?.type_a?.derived ? Object.entries(templates.type_a.derived).map(([key, val]) => ({
                key, name: key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
                template: val.template || '-', prefix: val.prefix || '', suffix: val.suffix || '', pattern: val.pattern || {}
            })) : [];

            return (
                <div className="flex-1 overflow-auto manuscript-bg p-8">
                    <div className="max-w-[1400px] mx-auto">
                        <div className="flex items-end justify-between mb-8">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white mb-2">Pattern Library</h1>
                                <p className="text-muted/70">Morphological templates from templates.json</p>
                            </div>
                            <a href="/api/templates" target="_blank" className="flex items-center gap-2 px-4 py-2 border border-primary/30 rounded-lg text-sm font-medium text-primary hover:bg-primary/5">
                                <Icon name="code" />
                                View Raw JSON
                            </a>
                        </div>

                        {loading ? (
                            <PatternCardsSkeleton />
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                                {derivedPatterns.map((pattern, i) => (
                                    <div key={i} className="group bg-surface-dark rounded-xl border border-bronze/50 hover:border-primary/50 transition-all p-5 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-24 h-24 bg-primary/5 -mr-12 -mt-12 rounded-full blur-2xl group-hover:bg-primary/10 transition-all"></div>
                                        <div className="relative">
                                            <h3 className="text-lg font-bold text-gray-900 dark:text-white mb-1">{pattern.name}</h3>
                                            <p className="text-xs text-muted/50 font-mono mb-4">{pattern.template}</p>
                                            <div className="bg-background-dark/50 rounded-lg p-4 flex items-center justify-center gap-3 mb-4">
                                                {pattern.prefix && <span className="text-cyan-400 text-xl font-bold">{pattern.prefix}</span>}
                                                {Object.entries(pattern.pattern).map(([k, v], pi) => (
                                                    <span key={pi} className="text-muted">{k}:{v}</span>
                                                ))}
                                                {pattern.suffix && <span className="text-cyan-400 text-xl font-bold">{pattern.suffix}</span>}
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {pattern.prefix && <span className="px-2 py-1 bg-primary/10 text-primary text-[10px] font-bold uppercase rounded">Prefix: {pattern.prefix}</span>}
                                                {pattern.suffix && <span className="px-2 py-1 bg-cyan-400/10 text-cyan-400 text-[10px] font-bold uppercase rounded">Suffix: {pattern.suffix}</span>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {templates && (
                            <div className="mt-10">
                                <h2 className="text-xl font-bold text-gray-900 dark:text-white mb-4">Available Verb Types</h2>
                                <div className="flex flex-wrap gap-2">
                                    {Object.keys(templates).filter(k => !k.startsWith('_') && !k.startsWith('weak')).map(type => (
                                        <span key={type} className="px-3 py-2 bg-surface border border-bronze/50 rounded-lg text-sm text-muted">
                                            {type}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [activeTab, setActiveTab] = useState('xray');
            return (
                <div className="h-screen flex flex-col">
                    <Nav activeTab={activeTab} setActiveTab={setActiveTab} />
                    <div className="flex-1 overflow-auto pb-16 md:pb-0">
                        {activeTab === 'xray' && <XRayTab />}
                        {activeTab === 'matrix' && <MatrixTab />}
                        {activeTab === 'slider' && <SliderTab />}
                        {activeTab === 'compare' && <CompareTab />}
                        {activeTab === 'radial' && <RadialTab />}
                        {activeTab === 'patterns' && <PatternsTab />}
                    </div>
                    <MobileNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
